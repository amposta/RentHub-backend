<!-- Floating Login Button -->
<div id="floatingAuth" class="floating-auth" title="Login / Register">
    <i class="fas fa-user-circle text-xl"></i>
</div>

<!-- Auth Modal -->
<div id="authModal" class="auth-modal">
    <div class="auth-panel mx-auto mt-12 fade-in-up">
        <!-- Header -->
        <div class="p-8 border-b border-gray-200">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-bold text-gray-900">Welcome to RentHub</h2>
                <button class="auth-close text-gray-500 hover:text-gray-700 text-2xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p class="text-gray-600 mt-1">Please complete verification to start renting</p>
        </div>

        <!-- Tabs -->
        <div class="px-8 py-6 border-b border-gray-200">
            <div class="flex space-x-1 bg-gray-100 p-1 rounded-xl">
                <button onclick="switchTab('login')" id="tab-login" class="auth-tab flex-1 py-3 px-4 rounded-lg font-semibold text-gray-700 bg-white shadow-sm">
                    Login
                </button>
                <button onclick="switchTab('register')" id="tab-register" class="auth-tab flex-1 py-3 px-4 rounded-lg font-semibold text-gray-600">
                    Register
                </button>
            </div>
        </div>

        <!-- Tab Panels -->
        <div id="panel-login" class="auth-panel-content hidden px-8 pb-8">
            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all" placeholder="your@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full btn-primary">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login
                </button>
                <div class="text-center">
                    <a href="#" class="text-orange-500 hover:text-orange-600 font-semibold text-sm">Forgot Password?</a>
                </div>
            </form>
        </div>

        <div id="panel-register" class="auth-panel-content px-8 pb-8">
            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all" placeholder="your@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
                    <input type="tel" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all" placeholder="+63 912 345 6789">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full btn-primary">
                    <i class="fas fa-user-plus mr-2"></i>Create Account
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function switchTab(tabName) {
    // Implementation already in main.js
}
</script>
