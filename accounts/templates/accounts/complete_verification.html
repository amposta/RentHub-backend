{% extends 'base.html' %}

{% block title %}Verification Complete{% endblock %}

{% block content %}
<div class="verification-complete-container">
    <div class="verification-card">
        <div class="success-icon">✓</div>
        <h1>Verification Complete!</h1>
        <p>Your account has been verified successfully.</p>
        <a href="{% url 'homepage' %}" class="btn-primary">Return to Home</a>
    </div>
</div>

<style>
    .verification-complete-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        background: linear-gradient(135deg, #fff5e6 0%, #ffe6cc 100%);
        padding: 20px;
    }

    .verification-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        padding: 40px;
        text-align: center;
        max-width: 500px;
        width: 100%;
    }

    .success-icon {
        font-size: 64px;
        color: #ff8c42;
        margin-bottom: 20px;
    }

    .verification-card h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 28px;
    }

    .verification-card p {
        color: #666;
        margin-bottom: 30px;
        font-size: 16px;
    }

    .btn-primary {
        background-color: #ff8c42;
        color: white;
        padding: 12px 30px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: bold;
        display: inline-block;
        transition: background-color 0.3s ease;
    }

    .btn-primary:hover {
        background-color: #e67e2d;
    }

    @media (max-width: 768px) {
        .verification-card {
            padding: 30px 20px;
        }

        .success-icon {
            font-size: 48px;
        }

        .verification-card h1 {
            font-size: 24px;
        }
    }
</style>
{% endblock %}
